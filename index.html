<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote of the Day</title>
    <link rel="icon" href="https://i.ibb.co/XxX8PksV/logo.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/XxX8PksV/logo.png">
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="content-wrapper">
    <a href="https://ibb.co/KcV1J0Yj"><img src="https://i.ibb.co/wZpvf0TN/White-logo.png" alt="White-logo" border="0"></a>        <div class="filter-container">
            <div class="select-wrapper">
                <select id="category-filter">
                    <option value="">All Categories</option>
                    <option value="inspirational">Inspirational</option>
                    <option value="humor">Humor</option>
                    <option value="success">Success</option>
                    <option value="love">Love</option>
                    <option value="art">Art</option>
                </select>
            </div>
        </div>
        <div id="premium-notification">Category filtering is a premium feature.</div>
        <div class="quote-display">
            <p id="quote-text"></p>
            <p id="quote-author"></p>
        </div>
        <div class="button-group">
            <button id="new-quote-btn"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 4v6h-6m-2.5-3.5a8 8 0 1 0 4.5 7.5"/></svg>New Quote</button>
            <button id="save-favorite-btn"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78Z"/></svg>Save Favorite</button>
            <button id="show-favorites-btn"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/></svg><span id="show-favorites-text">Show Favorites</span></button>
            <button id="clear-favorites-btn"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7h16m-10-4h4m6 4v11a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V7"/><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 11v6m6-6v6"/></svg>Clear Favorites</button>
            <div class="share-container">
                <button id="share-btn"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18 8a4 4 0 1 0-8 0 4 4 0 0 0 8 0Zm0 12a4 4 0 1 0-8 0 4 4 0 0 0 8 0Zm-8-6a4 4 0 1 0-8 0 4 4 0 0 0 8 0Zm1.33-1.05.67-.3m-.67 6.7.67-.3m-1.34-4.35-3.33-1.7"/></svg>Share</button>
                <div id="share-options" class="share-menu">
                    <a href="#" id="share-whatsapp">Share on WhatsApp</a>
                    <a href="#" id="share-linkedin">Share on LinkedIn</a>
                    <a href="#" id="share-facebook">Share on Facebook</a>
                </div>
            </div>
        </div>

        <section class="favorites-section">
            <h2>Favorite Quotes</h2>
            <input type="text" id="favorite-search" placeholder="Search favorites...">
            <ul id="favorites-list"></ul>
        </section>
    </main>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-content">
            <p id="modal-message"></p>
            <div class="modal-buttons">
                <button id="modal-confirm-btn">Confirm</button>
                <button id="modal-cancel-btn">Cancel</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
